<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目展示</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      background: #f3f5f9;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 24px;
      padding: 50px 60px;
    }

    h1 {
      font-size: 52px;
      color: #2f6fe4;
      margin-bottom: 24px;
    }

    p {
      font-size: 20px;
      line-height: 1.7;
    }

    .card {
      margin-top: 28px;
      padding: 24px 28px;
      background: #f7f9fc;
      border-radius: 18px;
    }

    .card h2 {
      margin: 0 0 12px 0;
      font-size: 28px;
    }

    .card p {
      margin: 0 0 16px 0;
      font-size: 18px;
    }

    .button {
      display: inline-block;
      padding: 14px 28px;
      background-color: #2f6fe4;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
    }

    .button:hover {
      background-color: #245ed0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>项目展示</h1>
    <p>这里会展示我做过的一些项目、作品和学习成果。</p>

    <div class="card">
      <h2>项目 1</h2>
      <p>这里可以写项目简介，比如这个项目是做什么的，我学到了什么。</p>
      <a href="#" class="button">查看详情</a>
    </div>

    <div class="card">
      <h2>项目 2</h2>
      <p>这里可以放另一个项目，以后可以继续增加。</p>
      <a href="#" class="button">查看详情</a>
    </div>

    <div style="margin-top: 36px;">
      <a href="/" class="button">返回首页</a>
    </div>
  </div>
</body>
</html>
