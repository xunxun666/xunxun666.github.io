<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人简介</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
      background: black;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="overlay">Loading...</div>

  <video
    id="video"
    autoplay
    muted
    playsinline
    preload="auto"
    loop
  >
    <source src="./rickroll.mp4" type="video/mp4" />
  </video>

  <script>
    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");

    const initialTitle = "个人简介";
    const playingTitle = "你被骗了！";
    const hiddenTitle = "点开有惊喜";

    let hasStartedPlaying = false;
    let userEnabledSound = false;

    document.title = initialTitle;

    function updateVisibleTitle() {
      if (hasStartedPlaying) {
        document.title = playingTitle;
      } else {
        document.title = initialTitle;
      }
    }

    function setPlayingState() {
      hasStartedPlaying = true;
      if (!document.hidden) {
        document.title = playingTitle;
      }
      overlay.style.display = "none";
    }

    async function tryPlayMuted() {
      try {
        video.muted = true;
        await video.play();
        setPlayingState();
      } catch (e) {
        overlay.innerText = "点击屏幕继续";
      }
    }

    window.addEventListener("load", tryPlayMuted);
    video.addEventListener("canplay", tryPlayMuted);

    video.addEventListener("playing", function () {
      setPlayingState();
    });

    document.body.addEventListener("click", async function () {
      try {
        if (!hasStartedPlaying) {
          await video.play();
          setPlayingState();
        }

        if (!userEnabledSound) {
          video.muted = false;
          userEnabledSound = true;
        }

        await video.play();
        overlay.style.display = "none";
        updateVisibleTitle();
      } catch (e) {
        overlay.innerText = "点击屏幕继续";
        overlay.style.display = "flex";
      }
    });

    document.addEventListener("visibilitychange", async function () {
      if (document.hidden) {
        document.title = hiddenTitle;
        video.pause();
      } else {
        updateVisibleTitle();
        try {
          await video.play();
        } catch (e) {
          overlay.innerText = userEnabledSound ? "点击继续播放" : "点击开启声音";
          overlay.style.display = "flex";
        }
      }
    });
  </script>
</body>
</html>
