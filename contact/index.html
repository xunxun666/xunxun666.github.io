<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
      background: black;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="overlay">Loading...</div>

  <video
    id="video"
    autoplay
    muted
    playsinline
    preload="auto"
    loop
  >
    <source src="./rickroll.mp4" type="video/mp4" />
  </video>

  <script>
    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");

    async function tryPlay() {
      try {
        await video.play();
        overlay.style.display = "none";
      } catch (e) {
        overlay.innerText = "Tap to continue";
      }
    }

    video.addEventListener("canplay", tryPlay);
    window.addEventListener("load", tryPlay);

    document.body.addEventListener("click", async () => {
      try {
        await video.play();
        video.muted = false;
        overlay.style.display = "none";
      } catch (e) {}
    });

    setTimeout(() => {
      try {
        video.muted = false;
      } catch (e) {}
    }, 800);
  </script>
</body>
</html>
