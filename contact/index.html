<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人简介</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 18px;
      background: black;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="overlay">Loading...</div>

  <video
    id="video"
    autoplay
    muted
    playsinline
    preload="auto"
    loop
  >
    <source src="./rickroll.mp4" type="video/mp4" />
  </video>

  <script>
    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");

    const initialTitle = "个人简介";
    const playingTitle = "你被骗了！";
    const hiddenTitle = "点开有惊喜";

    let hasStartedPlaying = false;

    document.title = initialTitle;

    function setPlayingTitle() {
      hasStartedPlaying = true;
      if (!document.hidden) {
        document.title = playingTitle;
      }
    }

    async function tryPlay() {
      try {
        await video.play();
        overlay.style.display = "none";
        setPlayingTitle();
      } catch (e) {
        overlay.innerText = "Tap to continue";
      }
    }

    video.addEventListener("canplay", tryPlay);
    window.addEventListener("load", tryPlay);

    video.addEventListener("playing", function () {
      overlay.style.display = "none";
      setPlayingTitle();
    });

    document.body.addEventListener("click", async () => {
      try {
        await video.play();
        video.muted = false;
        overlay.style.display = "none";
        setPlayingTitle();
      } catch (e) {}
    });

    setTimeout(() => {
      try {
        video.muted = false;
      } catch (e) {}
    }, 800);

    document.addEventListener("visibilitychange", function () {
      if (document.hidden) {
        document.title = hiddenTitle;
      } else {
        if (hasStartedPlaying) {
          document.title = playingTitle;
        } else {
          document.title = initialTitle;
        }
      }
    });
  </script>
</body>
</html>
