<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xunxun666的网站</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      margin: 0;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: 60px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 42px;
      color: #1f6feb;
    }

    h2 {
      margin-top: 32px;
      font-size: 24px;
    }

    p {
      font-size: 18px;
      line-height: 1.8;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 22px;
      background: #1f6feb;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 16px;
    }

    .button:hover {
      background: #1558b0;
    }

    ul {
      padding-left: 20px;
      font-size: 18px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>欢迎来到我的网站</h1>
      <p>这是我用 GitHub Pages 免费搭建的第一个网站。</p>

      <h2>如何开设</h2>
      <p>使用chatgpt</p>

      <h2>我想展示的内容</h2>
      <ul>
        <li><a href="person/" class="button">个人介绍</a></li>
        <li><a href="projects/" class="button">项目展示</a></li>
        <li><a href="contact/" class="button">联系方式</a></li>
        <li>?</li>
      </ul>

      <a class="button" href="https://github.com/xunxun666" target="_blank">查看我的 GitHub</a>
    </div>
  </div>

  <script>
    const defaultTitle = document.title;
    let titleTimer = null;
    let isInternalNavigation = false;

    document.querySelectorAll('a[href]').forEach(link => {
      link.addEventListener('click', function () {
        const href = this.getAttribute('href');
        if (!href) return;

        if (
          href.startsWith('/') ||
          href.startsWith('./') ||
          href.startsWith('../') ||
          href.startsWith('person/') ||
          href.startsWith('projects/') ||
          href.startsWith('contact/') ||
          href.startsWith('index.html')
        ) {
          isInternalNavigation = true;
        }
      });
    });

    document.addEventListener('visibilitychange', function () {
      if (titleTimer) {
        clearTimeout(titleTimer);
        titleTimer = null;
      }

      if (document.hidden) {
        if (!isInternalNavigation) {
          document.title = "ヽ(；д； )别走—xun窝";
        }
      } else {
        if (!isInternalNavigation) {
          document.title = "(≧▽≦)欢迎回家—xun窝";

          titleTimer = setTimeout(() => {
            if (!document.hidden) {
              document.title = defaultTitle;
            }
            titleTimer = null;
          }, 5000);
        }
      }
    });

    window.addEventListener('pageshow', function () {
      isInternalNavigation = false;
      if (titleTimer) {
        clearTimeout(titleTimer);
        titleTimer = null;
      }
      document.title = defaultTitle;
    });
  </script>
</body>
</html>
